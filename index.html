<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --parchment:#f5f0e1;--parchment2:#ede8d5;--border:#d9d3c7;
    --gold:#c4a24c;--gold-dark:#a07830;--text:#2e2e2e;--muted:#5a5a5a;
    --rose-bg:#f5e8e8;--rose-bd:#c9a0a0;--rose-dk:#a05050;

    --yellow-bg:#f5f0d8;--yellow-bd:#c9bf78;--yellow-dk:#908030;
  }
  body { background:var(--parchment); font-family:'Source Serif 4',Georgia,serif; font-size:1rem; color:var(--text); line-height:1.65; min-height:100vh; }
  header { background:var(--parchment2); border-bottom:2px solid var(--gold); padding:1.4rem 2rem 1.1rem; text-align:center; }
  header h1 { font-family:'Playfair Display',Georgia,serif; font-size:1.5rem; }

  .band-selector { margin-bottom:1.8rem; }
  .band-selector-label { font-size:0.8rem; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); margin-bottom:0.6rem; }

  .band-btn { font-family:'Source Serif 4',Georgia,serif; font-size:0.88rem; padding:0.45rem 1rem; border-radius:4px; border:1px solid var(--border); background:var(--parchment2); color:var(--text); cursor:pointer; transition:all 0.15s; }
  .band-btn:hover { border-color:var(--gold); color:var(--gold-dark); }
  .band-btn.active { background:var(--gold); border-color:var(--gold); color:#fff; font-weight:600; }
  .band-intro { background:var(--parchment2); border-left:4px solid var(--gold); border-radius:0 5px 5px 0; padding:0.9rem 1.1rem; margin-bottom:1.5rem; font-size:0.93rem; color:var(--muted); font-style:italic; display:none; }
  .band-intro.visible { display:block; }
  .progress-wrap { display:flex; align-items:center; gap:0.75rem; margin-bottom:1.5rem; }
  .progress-track { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--gold); border-radius:3px; transition:width 0.4s ease; }
  .progress-label { font-size:0.8rem; color:var(--muted); white-space:nowrap; font-variant-numeric:tabular-nums; }
  .exercise-card { border-radius:8px; border:1px solid var(--border); overflow:hidden; margin-bottom:1.2rem; transition:box-shadow 0.2s; }
  .exercise-card:focus-within { box-shadow:0 2px 12px rgba(196,162,76,0.18); }
  .card-header { background:var(--parchment2); border-bottom:1px solid var(--border); padding:0.8rem 1.1rem; display:flex; align-items:baseline; gap:0.6rem; }
  .card-number { font-family:'Playfair Display',serif; font-size:0.76rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--gold-dark); }
  .card-technique { font-size:0.81rem; color:var(--muted); font-style:italic; }
  .card-body { padding:1.1rem 1.1rem 0.7rem; }
  .source-sentences { background:var(--parchment2); border-left:3px solid var(--gold); border-radius:0 4px 4px 0; padding:0.8rem 1rem; margin-bottom:0.9rem; }
  .source-sentences p { font-size:0.96rem; margin-bottom:0.35rem; }
  .source-sentences p:last-child { margin-bottom:0; }
  .source-sentences p::before { content:attr(data-n) '. '; color:var(--gold-dark); font-weight:600; font-size:0.84rem; }
  .prompt-label { font-size:0.82rem; font-weight:600; color:var(--muted); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.05em; }
  .hint { font-size:0.82rem; color:var(--muted); font-style:italic; margin-bottom:0.55rem; border-left:2px solid var(--border); padding-left:0.6rem; }
  textarea { width:100%; min-height:72px; border:1px solid var(--border); border-radius:5px; background:#fffdf8; font-family:'Source Serif 4',Georgia,serif; font-size:0.96rem; color:var(--text); padding:0.65rem 0.8rem; line-height:1.55; resize:vertical; outline:none; transition:border-color 0.2s; }
  textarea:focus { border-color:var(--gold); }
  textarea::placeholder { color:#b0a898; font-style:italic; }
  .card-footer { padding:0.75rem 1.1rem 0.9rem; display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; }
  button { font-family:'Source Serif 4',Georgia,serif; font-size:0.87rem; cursor:pointer; border-radius:4px; padding:0.48rem 1rem; border:none; transition:background 0.15s, transform 0.1s; }
  button:active { transform:translateY(1px); }
  button:disabled { opacity:0.45; cursor:not-allowed; transform:none; }
  .btn-submit { background:var(--gold); color:#fff; font-weight:600; }
  .btn-submit:hover:not(:disabled) { background:var(--gold-dark); }
  .btn-skip { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-skip:hover:not(:disabled) { background:var(--parchment2); }
  .btn-next { background:var(--gold); color:#fff; font-weight:600; }

  .btn-retry:hover { background:var(--parchment2); }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:0.3rem; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .feedback { border-radius:0 0 7px 7px; border-top:1px solid var(--border); padding:1rem 1.1rem 1.1rem; font-size:0.93rem; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none} }
  .feedback h4 { font-family:'Playfair Display',serif; font-size:0.93rem; margin-bottom:0.5rem; }
  .feedback p { margin-bottom:0.45rem; line-height:1.6; }
  .feedback p:last-child { margin-bottom:0; }
  .technique-badge { display:inline-block; font-size:0.74rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; border-radius:3px; padding:0.13rem 0.45rem; margin-bottom:0.55rem; }
  .fb-0 { background:var(--rose-bg); border-top-color:var(--rose-bd); }
  .fb-0 h4 { color:var(--rose-dk); }
  .fb-0 .technique-badge { background:var(--rose-dk); color:#fff; }
  .fb-1 { background:var(--orange-bg); border-top-color:var(--orange-bd); }
  .fb-1 h4 { color:var(--orange-dk); }
  .fb-1 .technique-badge { background:var(--orange-dk); color:#fff; }
  .fb-2 { background:var(--yellow-bg); border-top-color:var(--yellow-bd); }
  .fb-2 h4 { color:var(--yellow-dk); }
  .fb-2 .technique-badge { background:var(--yellow-dk); color:#fff; }
  .completion { text-align:center; padding:2.2rem 1.4rem; background:var(--parchment2); border:1px solid var(--border); border-radius:8px; display:none; }
  .completion.visible { display:block; animation:fadeIn 0.4s ease; }
  .completion h2 { font-family:'Playfair Display',serif; font-size:1.4rem; margin-bottom:0.65rem; color:var(--gold-dark); }
  .completion p { color:var(--muted); font-size:0.92rem; margin-bottom:0.45rem; }
  .restart-btn { margin-top:1.1rem; background:var(--gold); color:#fff; font-weight:600; padding:0.55rem 1.3rem; font-size:0.9rem; cursor:pointer; }
  .restart-btn:hover { background:var(--gold-dark); }
  .api-error { background:#fdf4f4; border:1px solid #c9a0a0; border-radius:5px; padding:0.7rem 1rem; font-size:0.86rem; color:#a05050; margin:0 1.1rem 0.9rem; }
  footer { text-align:center; font-size:0.76rem; color:#b0a898; padding:1rem; border-top:1px solid var(--border); margin-top:1rem; }
</style>

<body>
<header>
  <h1>Sentence Combining &middot; Grade Band Practice</h1>
  <p>EDSC 4850 &middot; Modeling instruction across grade levels &middot; Clemson University</p>
</header>
<main>
  <div class="band-selector">
    <div class="band-selector-label">Select a grade band</div>
    <div class="band-buttons" id="bandButtons">
      <button class="band-btn" data-band="6">Grades 6&ndash;7</button>
      <button class="band-btn" data-band="8">Grades 8&ndash;9</button>
      <button class="band-btn" data-band="10">Grades 10&ndash;11</button>
      <button class="band-btn" data-band="12">Grade 12</button>
    </div>
  </div>
  <div class="band-intro" id="bandIntro"></div>
  <div id="progressArea" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-label" id="progressLabel">0 of 3</span>
    </div>
  </div>
  <div id="exerciseContainer"></div>
  <div class="completion" id="completionScreen">
    <h2>All three done.</h2>
    <p id="completionNote"></p>

</main>
<footer>Questions? <a href="/cdn-cgi/l/email-protection#117061747d6551727d747c627e7f3f747564" style="color:var(--gold-dark);"><span class="__cf_email__" data-cfemail="ec8d9c898098ac8f8089819f8382c2898899">[email&#160;protected]</span></a></footer>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
const PROXY = 'https://anthropic-proxy.aprilpelt.workers.dev';

const BANDS = {
  6: {
    label:'Grades 6-7',
    intro:'These exercises are designed for students who are learning to use conjunctions and simple combining strategies for the first time. Sentences are short, vocabulary is accessible, and the techniques are limited to coordination and simple subordination. As a preservice teacher, try each exercise as a student would—then think about how you\'d introduce the technique to a class.',
    completion:'At grades 6-7, the goal is for students to hear what combined sentences sound like and to have a name for what they did. Even naming "I used because" is meaningful progress at this level.',
    exercises:[
      { label:'Exercise 1', technique:'Coordination with and / but', sentences:['AI can answer questions very quickly.','AI sometimes gets the answer wrong.'], hint:'Join these two sentences using but or yet to show the contrast between them. Think about which word best captures the relationship.' },
      { label:'Exercise 2', technique:'Subordination with because', sentences:['You should always check AI answers.','AI can make things up.'], hint:'Use because to connect these two ideas. Try it two ways: starting with because, and putting because in the middle. Which version do you prefer?' },
      { label:'Exercise 3', technique:'Subordination with when / if', sentences:['You use an AI chatbot for homework.','You are responsible for checking whether the answers are accurate.'], hint:'Use when or if to connect these sentences. The first sentence will become a subordinate clause that sets up the second one.' }
    ]
  },
  8: {
    label:'Grades 8-9',
    intro:'At grades 8-9, exercises introduce relative clauses and appositives, which require students to embed one idea inside another rather than just joining two ideas side by side. Source sentences are longer and involve more abstract concepts. The goal is for students to practice nesting information efficiently.',
    completion:'At grades 8-9, students are ready to embed information inside sentences rather than just stringing ideas together. The relative clause and appositive are the two structures that most immediately improve writing density and sophistication.',
    exercises:[
      { label:'Exercise 1', technique:'Coordination with contrast', sentences:['Social media algorithms learn what content keeps you engaged.','They do not know whether that content is accurate.','They do not know whether it is good for you.'], hint:'Try combining all three sentences into one. Use a coordinating conjunction to handle the contrast, and consider how to fold the last two sentences together efficiently.' },
      { label:'Exercise 2', technique:'Relative clause with who / which', sentences:['Ted Chiang is a science fiction writer.','He argued that AI tools are like blurry photographs of the internet.','His argument helps explain why AI sometimes invents facts.'], hint:'Use who or whose to fold information about Ted Chiang into a single sentence. You probably won\'t need all three source sentences—use what\'s most important.' },
      { label:'Exercise 3', technique:'Appositive phrase', sentences:['Cognitive offloading means letting a tool do your thinking for you.','Cognitive offloading may reduce critical thinking skills over time.','A researcher named Gerlich studied this in 2025.'], hint:'Use an appositive to embed the definition of cognitive offloading directly into a sentence about Gerlich\'s research, so you don\'t have to define and report separately.' }
    ]
  },
  10: {
    label:'Grades 10-11',
    intro:'At grades 10-11, exercises focus on participial phrases and the rhetorical choices involved in coordination and subordination. Students at this level are ready to think not just about whether a combination is grammatically correct but about what effect it creates—what it emphasizes, what it subordinates, and why those choices matter for argument.',
    completion:'At grades 10-11, the most important shift is from "did I combine correctly?" to "what does this combination do?" Students who can articulate the rhetorical effect of a structural choice are developing real writer\'s awareness.',
    exercises:[
      { label:'Exercise 1', technique:'Participial phrase', sentences:['Roe and colleagues applied Conceptual Metaphor Theory.','They compared generative AI to synthetic plastic.','Both are useful, ubiquitous, and potentially toxic to their environments.'], hint:'Open your sentence with a participial phrase (a verb form ending in -ing) that shows how the researchers approached their argument. Then complete the sentence with their central claim.' },
      { label:'Exercise 2', technique:'Subordination to show cause and consequence', sentences:['AI tools produce text that sounds fluent and authoritative.','Readers may not notice when the content contains errors.','Fluency is not the same thing as accuracy.'], hint:'Use subordination to show the causal chain here: what is it about fluency that creates the risk? Try beginning with because or since, or try using although to introduce a concession.' },
      { label:'Exercise 3', technique:'Free choice', sentences:['Writing a sentence forces a writer to commit to a claim.','Generating a sentence with AI does not require the same commitment.','The cognitive work of drafting is where much of the thinking happens.'], hint:'No prescribed technique this time. Combine these sentences in whatever way you think best serves the meaning. Be prepared to name what you did and explain why you made that choice.' }
    ]
  },
  12: {
    label:'Grade 12',
    intro:'At grade 12, exercises introduce the semicolon and conjunctive adverb as tools for signaling logical relationships between independent clauses, and they ask students to make and defend complex structural choices. The source sentences are more abstract, the relationships between ideas are more nuanced, and the expectation is that students can articulate not just what they did but why.',
    completion:'At grade 12, sentence combining becomes a revision strategy as much as a grammar exercise. Students who can combine at this level are developing the kind of syntactic control that shows up in AP and college writing.',
    exercises:[
      { label:'Exercise 1', technique:'Semicolon with conjunctive adverb', sentences:['AI tools can dramatically reduce the effort required to produce a first draft.','The struggle of drafting is where a great deal of the learning happens.','Removing that struggle may reduce writing skill development over time.'], hint:'Use a semicolon—either alone or with a conjunctive adverb like however, therefore, or consequently—to connect two of these ideas. Choose the conjunctive adverb that most precisely names the logical relationship you want to signal.' },
      { label:'Exercise 2', technique:'Parallel structure across clauses', sentences:['AI tools threaten to make writing easier.','AI tools threaten to make reading harder.','AI tools threaten to make the distinction between the two less meaningful.'], hint:'These three ideas are naturally parallel. Combine them into a single sentence that makes the parallel structure visible and emphatic. Consider whether coordination or a different structure best serves the rhythm you want.' },
      { label:'Exercise 3', technique:'Free choice — maximum complexity', sentences:['Chiang argues that AI is a compression algorithm, not a reasoning system.','Roe and colleagues argue that AI-generated content is like digital plastic.','Both metaphors suggest that AI outputs require more critical evaluation, not less, as these tools become more capable.'], hint:'Combine these three ideas into one or two sentences of your own design. You might subordinate one argument to another, use an appositive to handle one of the attributions, or use parallel structure to align the two metaphors. Name every technique you used.' }
    ]
  }
};

let currentBand = null;
let currentIndex = 0;

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectBand(band) {
  currentBand = band;
  currentIndex = 0;
  document.querySelectorAll('.band-btn').forEach(function(b) {
    b.classList.toggle('active', parseInt(b.dataset.band) === band);
  });
  var data = BANDS[band];
  var intro = document.getElementById('bandIntro');
  intro.textContent = data.intro;
  intro.classList.add('visible');
  document.getElementById('progressArea').style.display = 'block';
  document.getElementById('completionScreen').classList.remove('visible');
  renderExercise(0);
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderExercise(index) {
  var data = BANDS[currentBand];
  var ex = data.exercises[index];
  var container = document.getElementById('exerciseContainer');

  var card = document.createElement('div');
  card.className = 'exercise-card';
  card.id = 'card-' + index;

  var hdr = document.createElement('div');
  hdr.className = 'card-header';
  var num = document.createElement('span');
  num.className = 'card-number';
  num.textContent = ex.label;
  var tech = document.createElement('span');
  tech.className = 'card-technique';
  tech.textContent = ex.technique;
  hdr.appendChild(num);
  hdr.appendChild(tech);
  card.appendChild(hdr);

  var body = document.createElement('div');
  body.className = 'card-body';

  var sources = document.createElement('div');
  sources.className = 'source-sentences';
  ex.sentences.forEach(function(s, i) {
    var p = document.createElement('p');
    p.dataset.n = i + 1;
    p.textContent = s;
    sources.appendChild(p);
  });
  body.appendChild(sources);

  var pl = document.createElement('div');
  pl.className = 'prompt-label';
  pl.textContent = 'Your combination';
  body.appendChild(pl);

  var hint = document.createElement('div');
  hint.className = 'hint';
  hint.textContent = ex.hint;
  body.appendChild(hint);

  var ta = document.createElement('textarea');
  ta.id = 'ta-' + index;
  ta.placeholder = 'Type your combined sentence here\u2026';
  ta.setAttribute('aria-label', 'Your sentence combination for exercise ' + (index + 1));
  body.appendChild(ta);
  card.appendChild(body);

  var footer = document.createElement('div');
  footer.className = 'card-footer';
  footer.id = 'footer-' + index;

  var btnS = document.createElement('button');
  btnS.className = 'btn-submit';
  btnS.textContent = 'Get feedback';
  btnS.id = 'btn-submit-' + index;
  btnS.addEventListener('click', function() { submitCombination(index); });
  footer.appendChild(btnS);

  var btnSk = document.createElement('button');
  btnSk.className = 'btn-skip';
  btnSk.textContent = 'Skip';
  btnSk.addEventListener('click', function() { advanceOrComplete(index); });
  footer.appendChild(btnSk);

  card.appendChild(footer);
  container.innerHTML = '';
  container.appendChild(card);
  updateProgress(index);
  ta.focus();
}

function updateProgress(index) {
  document.getElementById('progressFill').style.width = (index / 3 * 100) + '%';
  document.getElementById('progressLabel').textContent = index + ' of 3';
}

function submitCombination(index) {
  var ta = document.getElementById('ta-' + index);
  var userText = ta.value.trim();
  if (!userText) { ta.focus(); return; }

  var btn = document.getElementById('btn-submit-' + index);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Evaluating\u2026';

  var data = BANDS[currentBand];
  var ex = data.exercises[index];
  var sourcesText = ex.sentences.map(function(s, i) { return (i+1) + '. ' + s; }).join('\n');

  var gradeContext = currentBand <= 7
    ? 'This is a grades 6-7 exercise. Feedback should be encouraging and name the technique in simple terms. Prioritize affirming what worked over identifying errors, though gentle corrections are appropriate if the combination introduces a new error.'
    : currentBand <= 9
    ? 'This is a grades 8-9 exercise. Feedback should be specific about the grammatical technique used and note one thing that works well before noting any issues.'
    : currentBand <= 11
    ? 'This is a grades 10-11 exercise. Feedback should name the technique precisely, evaluate the rhetorical effect (not just correctness), and suggest an alternative approach if one is notably stronger.'
    : 'This is a grade 12 exercise. Feedback should be analytically rigorous: name every technique used, evaluate the rhetorical choices, compare the combination against alternatives where relevant, and expect the student to articulate their structural decisions.';

  var systemPrompt = 'You are a grammar and writing instructor giving feedback on a sentence combining exercise for ' + data.label + '. ' + gradeContext + '\n\nYour feedback should be specific, pedagogically useful, and brief (3-5 sentences total). Sentence combining has many valid answers—respond to what the student actually wrote.\n\nFormat your response as JSON with exactly these keys:\n{\n  "techniqueName": "short name of the primary technique used",\n  "heading": "one short evaluative phrase",\n  "body": "3-5 sentences of feedback appropriate to the grade level",\n  "hasError": true or false\n}\n\nRespond ONLY with valid JSON. No preamble, no markdown fences.';

  var userPrompt = 'The exercise asked students to combine these sentences using: ' + ex.technique + '\n\nSource sentences:\n' + sourcesText + '\n\nHint given: "' + ex.hint + '"\n\nStudent\'s combination: "' + userText + '"\n\nEvaluate their combination.';

  fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    })
  })
  .then(function(response) {
    if (!response.ok) throw new Error('API ' + response.status);
    return response.json();
  })
  .then(function(d) {
    var raw = d.content.filter(function(b) { return b.type === 'text'; }).map(function(b) { return b.text; }).join('');
    var result = JSON.parse(raw.replace(/```json|```/g, '').trim());
    showFeedback(index, result);
  })
  .catch(function() { showApiError(index); });
}

function showFeedback(index, result) {
  var card = document.getElementById('card-' + index);
  var old = card.querySelector('.feedback');
  if (old) old.remove();

  var panel = document.createElement('div');
  panel.className = 'feedback fb-' + (index % 3);

  var badge = document.createElement('span');
  badge.className = 'technique-badge';
  badge.textContent = result.techniqueName;
  panel.appendChild(badge);

  var h4 = document.createElement('h4');
  h4.textContent = result.heading;
  panel.appendChild(h4);

  result.body.split('\n').filter(function(l) { return l.trim(); }).forEach(function(l) {
    var p = document.createElement('p');
    p.textContent = l;
    panel.appendChild(p);
  });

  card.appendChild(panel);

  var footer = document.getElementById('footer-' + index);
  footer.innerHTML = '';

  var btnR = document.createElement('button');
  btnR.className = 'btn-retry';
  btnR.textContent = 'Try again';
  btnR.addEventListener('click', function() { retryExercise(index); });
  footer.appendChild(btnR);

  var btnN = document.createElement('button');
  btnN.className = 'btn-next';
  btnN.textContent = index >= 2 ? 'Finish' : 'Next \u2192';
  btnN.addEventListener('click', function() { advanceOrComplete(index); });
  footer.appendChild(btnN);

  panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function showApiError(index) {
  var card = document.getElementById('card-' + index);
  var old = card.querySelector('.feedback, .api-error');
  if (old) old.remove();
  var err = document.createElement('div');
  err.className = 'api-error';
  err.textContent = 'Feedback is temporarily unavailable. Check your connection and try again.';
  card.appendChild(err);
  var btn = document.getElementById('btn-submit-' + index);
  if (btn) { btn.disabled = false; btn.textContent = 'Get feedback'; }
}

function retryExercise(index) {
  var card = document.getElementById('card-' + index);
  var panel = card.querySelector('.feedback');
  if (panel) panel.remove();
  var footer = document.getElementById('footer-' + index);
  footer.innerHTML = '';

  var btnS = document.createElement('button');
  btnS.className = 'btn-submit';
  btnS.textContent = 'Get feedback';
  btnS.id = 'btn-submit-' + index;
  btnS.addEventListener('click', function() { submitCombination(index); });
  footer.appendChild(btnS);

  var btnSk = document.createElement('button');
  btnSk.className = 'btn-skip';
  btnSk.textContent = 'Skip';
  btnSk.addEventListener('click', function() { advanceOrComplete(index); });
  footer.appendChild(btnSk);

  var ta = document.getElementById('ta-' + index);
  ta.value = '';
  ta.focus();
}

function advanceOrComplete(index) {
  currentIndex = index + 1;
  if (currentIndex >= 3) {
    document.getElementById('exerciseContainer').innerHTML = '';
    document.getElementById('completionNote').textContent = BANDS[currentBand].completion;
    document.getElementById('completionScreen').classList.add('visible');
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressLabel').textContent = '3 of 3';
    window.scrollTo({top:0, behavior:'smooth'});
  } else {
    renderExercise(currentIndex);
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sentence Combining · Grade Band Practice · EDSC 4850</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f0e1; font-family: Georgia, 'Times New Roman', serif; font-size: 16px; color: #2e2e2e; line-height: 1.65; min-height: 100vh; }
header { background: #ede8d5; border-bottom: 2px solid #c4a24c; padding: 20px 30px 16px; text-align: center; }
header h1 { font-size: 22px; font-weight: bold; }
header p { font-size: 14px; color: #5a5a5a; margin-top: 5px; font-style: italic; }
main { max-width: 760px; margin: 0 auto; padding: 24px 20px 48px; }
.band-label { font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #5a5a5a; margin-bottom: 10px; }
.band-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.band-btn { font-family: Georgia, serif; font-size: 14px; padding: 8px 16px; border-radius: 4px; border: 1px solid #d9d3c7; background: #ede8d5; color: #2e2e2e; cursor: pointer; }
.band-btn:hover { border-color: #c4a24c; color: #a07830; }
.band-btn.active { background: #c4a24c; border-color: #c4a24c; color: #ffffff; font-weight: bold; }
.band-intro { background: #ede8d5; border-left: 4px solid #c4a24c; padding: 12px 16px; margin-bottom: 20px; font-size: 14px; color: #5a5a5a; font-style: italic; display: none; }
.band-intro.visible { display: block; }
.progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.progress-track { flex: 1; height: 6px; background: #d9d3c7; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #c4a24c; border-radius: 3px; transition: width 0.4s; }
.progress-label { font-size: 13px; color: #5a5a5a; white-space: nowrap; }
.card { border: 1px solid #d9d3c7; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: #ffffff; }
.card-header { background: #ede8d5; border-bottom: 1px solid #d9d3c7; padding: 12px 18px; }
.card-number { font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #a07830; }
.card-technique { font-size: 13px; color: #5a5a5a; font-style: italic; margin-left: 8px; }
.card-body { padding: 18px 18px 12px; }
.sources { background: #f5f0e1; border-left: 3px solid #c4a24c; border-radius: 0 4px 4px 0; padding: 12px 16px; margin-bottom: 14px; }
.source-line { font-size: 15px; margin-bottom: 6px; }
.source-line:last-child { margin-bottom: 0; }
.source-num { color: #a07830; font-weight: bold; font-size: 13px; }
.prompt-label { font-size: 13px; font-weight: bold; color: #5a5a5a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.hint { font-size: 13px; color: #5a5a5a; font-style: italic; margin-bottom: 10px; border-left: 2px solid #d9d3c7; padding-left: 10px; }
textarea { width: 100%; min-height: 76px; border: 1px solid #d9d3c7; border-radius: 4px; background: #fffdf8; font-family: Georgia, serif; font-size: 15px; color: #2e2e2e; padding: 10px 12px; line-height: 1.55; resize: vertical; outline: none; }
textarea:focus { border-color: #c4a24c; }
textarea::placeholder { color: #b0a898; font-style: italic; }
.card-footer { padding: 12px 18px 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
button { font-family: Georgia, serif; font-size: 14px; cursor: pointer; border-radius: 4px; padding: 8px 18px; border: none; }
.btn-submit { background: #c4a24c; color: #ffffff; font-weight: bold; }
.btn-submit:hover:not(:disabled) { background: #a07830; }
.btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-skip { background: transparent; color: #5a5a5a; border: 1px solid #d9d3c7; }
.btn-skip:hover:not(:disabled) { background: #ede8d5; }
.btn-next { background: #c4a24c; color: #ffffff; font-weight: bold; }
.btn-next:hover { background: #a07830; }
.btn-retry { background: transparent; color: #a07830; border: 1px solid #c4a24c; }
.btn-retry:hover { background: #f5f0e1; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }
@keyframes spin { to { transform: rotate(360deg); } }
.feedback { padding: 14px 18px 16px; border-top: 1px solid #d9d3c7; font-size: 14px; }
.feedback-rose { background: #f5e8e8; border-top-color: #c9a0a0; }
.feedback-orange { background: #f5ede0; border-top-color: #c9a878; }
.feedback-yellow { background: #f5f0d8; border-top-color: #c9bf78; }
.badge { display: inline-block; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-radius: 3px; padding: 2px 8px; margin-bottom: 8px; color: #ffffff; }
.badge-rose { background: #a05050; }
.badge-orange { background: #a06830; }
.badge-yellow { background: #908030; }
.feedback h4 { font-size: 15px; margin-bottom: 8px; }
.feedback-rose h4 { color: #a05050; }
.feedback-orange h4 { color: #a06830; }
.feedback-yellow h4 { color: #908030; }
.feedback p { margin-bottom: 6px; line-height: 1.6; }
.feedback p:last-child { margin-bottom: 0; }
.completion { text-align: center; padding: 36px 24px; background: #ede8d5; border: 1px solid #d9d3c7; border-radius: 8px; display: none; }
.completion.visible { display: block; }
.completion h2 { font-size: 24px; color: #a07830; margin-bottom: 12px; }
.completion p { color: #5a5a5a; font-size: 14px; margin-bottom: 8px; }
.btn-restart { margin-top: 16px; background: #c4a24c; color: #ffffff; font-weight: bold; padding: 10px 22px; font-size: 14px; cursor: pointer; border: none; border-radius: 4px; }
.btn-restart:hover { background: #a07830; }
.api-error { background: #fdf4f4; border: 1px solid #c9a0a0; border-radius: 4px; padding: 10px 14px; font-size: 13px; color: #a05050; margin: 0 18px 14px; }
footer { text-align: center; font-size: 12px; color: #b0a898; padding: 16px; border-top: 1px solid #d9d3c7; margin-top: 16px; }
footer a { color: #a07830; }
</style>
</head>
<body>
<header>
  <h1>Sentence Combining &middot; Grade Band Practice</h1>
  <p>EDSC 4850 &middot; Modeling instruction across grade levels &middot; Clemson University</p>
</header>
<main>
  <div class="band-label">Select a grade band</div>
  <div class="band-buttons" id="bandButtons">
    <button class="band-btn" data-band="6">Grades 6&ndash;7</button>
    <button class="band-btn" data-band="8">Grades 8&ndash;9</button>
    <button class="band-btn" data-band="10">Grades 10&ndash;11</button>
    <button class="band-btn" data-band="12">Grade 12</button>
  </div>
  <div class="band-intro" id="bandIntro"></div>
  <div id="progressArea" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-label" id="progressLabel">0 of 3</span>
    </div>
  </div>
  <div id="exerciseContainer"></div>
  <div class="completion" id="completionScreen">
    <h2>All three done.</h2>
    <p id="completionNote"></p>
    <p>Try another grade band to see how the same techniques scale up or down in complexity.</p>
    <button class="btn-restart" id="restartBtn">Retry this band</button>
  </div>
</main>
<footer>Questions? <a href="mailto:apelt@clemson.edu">apelt@clemson.edu</a></footer>

<script>
var PROXY = 'https://anthropic-proxy.aprilpelt.workers.dev';

var BANDS = {
  6: {
    label: 'Grades 6-7',
    intro: 'These exercises are designed for students who are learning to use conjunctions and simple combining strategies for the first time. Sentences are short, vocabulary is accessible, and the techniques are limited to coordination and simple subordination. As a preservice teacher, try each exercise as a student would—then think about how you\'d introduce the technique to a class.',
    completion: 'At grades 6-7, the goal is for students to hear what combined sentences sound like and to have a name for what they did. Even naming "I used because" is meaningful progress at this level.',
    exercises: [
      { label: 'Exercise 1', technique: 'Coordination with and / but', sentences: ['AI can answer questions very quickly.', 'AI sometimes gets the answer wrong.'], hint: 'Join these two sentences using but or yet to show the contrast between them. Think about which word best captures the relationship.' },
      { label: 'Exercise 2', technique: 'Subordination with because', sentences: ['You should always check AI answers.', 'AI can make things up.'], hint: 'Use because to connect these two ideas. Try it two ways: starting with because, and putting because in the middle. Which version do you prefer?' },
      { label: 'Exercise 3', technique: 'Subordination with when / if', sentences: ['You use an AI chatbot for homework.', 'You are responsible for checking whether the answers are accurate.'], hint: 'Use when or if to connect these sentences. The first sentence will become a subordinate clause that sets up the second one.' }
    ]
  },
  8: {
    label: 'Grades 8-9',
    intro: 'At grades 8-9, exercises introduce relative clauses and appositives, which require students to embed one idea inside another rather than just joining two ideas side by side. Source sentences are longer and involve more abstract concepts. The goal is for students to practice nesting information efficiently.',
    completion: 'At grades 8-9, students are ready to embed information inside sentences rather than just stringing ideas together. The relative clause and appositive are the two structures that most immediately improve writing density and sophistication.',
    exercises: [
      { label: 'Exercise 1', technique: 'Coordination with contrast', sentences: ['Social media algorithms learn what content keeps you engaged.', 'They do not know whether that content is accurate.', 'They do not know whether it is good for you.'], hint: 'Try combining all three sentences into one. Use a coordinating conjunction to handle the contrast, and consider how to fold the last two sentences together efficiently.' },
      { label: 'Exercise 2', technique: 'Relative clause with who / which', sentences: ['Ted Chiang is a science fiction writer.', 'He argued that AI tools are like blurry photographs of the internet.', 'His argument helps explain why AI sometimes invents facts.'], hint: 'Use who or whose to fold information about Ted Chiang into a single sentence. You probably won\'t need all three source sentences—use what\'s most important.' },
      { label: 'Exercise 3', technique: 'Appositive phrase', sentences: ['Cognitive offloading means letting a tool do your thinking for you.', 'Cognitive offloading may reduce critical thinking skills over time.', 'A researcher named Gerlich studied this in 2025.'], hint: 'Use an appositive to embed the definition of cognitive offloading directly into a sentence about Gerlich\'s research, so you don\'t have to define and report separately.' }
    ]
  },
  10: {
    label: 'Grades 10-11',
    intro: 'At grades 10-11, exercises focus on participial phrases and the rhetorical choices involved in coordination and subordination. Students at this level are ready to think not just about whether a combination is grammatically correct but about what effect it creates.',
    completion: 'At grades 10-11, the most important shift is from "did I combine correctly?" to "what does this combination do?" Students who can articulate the rhetorical effect of a structural choice are developing real writer\'s awareness.',
    exercises: [
      { label: 'Exercise 1', technique: 'Participial phrase', sentences: ['Roe and colleagues applied Conceptual Metaphor Theory.', 'They compared generative AI to synthetic plastic.', 'Both are useful, ubiquitous, and potentially toxic to their environments.'], hint: 'Open your sentence with a participial phrase (a verb form ending in -ing) that shows how the researchers approached their argument. Then complete the sentence with their central claim.' },
      { label: 'Exercise 2', technique: 'Subordination to show cause and consequence', sentences: ['AI tools produce text that sounds fluent and authoritative.', 'Readers may not notice when the content contains errors.', 'Fluency is not the same thing as accuracy.'], hint: 'Use subordination to show the causal chain here. Try beginning with because or since, or try using although to introduce a concession.' },
      { label: 'Exercise 3', technique: 'Free choice', sentences: ['Writing a sentence forces a writer to commit to a claim.', 'Generating a sentence with AI does not require the same commitment.', 'The cognitive work of drafting is where much of the thinking happens.'], hint: 'No prescribed technique this time. Combine these sentences in whatever way you think best serves the meaning. Be prepared to name what you did and explain why you made that choice.' }
    ]
  },
  12: {
    label: 'Grade 12',
    intro: 'At grade 12, exercises introduce the semicolon and conjunctive adverb as tools for signaling logical relationships between independent clauses, and they ask students to make and defend complex structural choices.',
    completion: 'At grade 12, sentence combining becomes a revision strategy as much as a grammar exercise. Students who can combine at this level are developing the kind of syntactic control that shows up in AP and college writing.',
    exercises: [
      { label: 'Exercise 1', technique: 'Semicolon with conjunctive adverb', sentences: ['AI tools can dramatically reduce the effort required to produce a first draft.', 'The struggle of drafting is where a great deal of the learning happens.', 'Removing that struggle may reduce writing skill development over time.'], hint: 'Use a semicolon—either alone or with a conjunctive adverb like however, therefore, or consequently—to connect two of these ideas. Choose the conjunctive adverb that most precisely names the logical relationship.' },
      { label: 'Exercise 2', technique: 'Parallel structure across clauses', sentences: ['AI tools threaten to make writing easier.', 'AI tools threaten to make reading harder.', 'AI tools threaten to make the distinction between the two less meaningful.'], hint: 'These three ideas are naturally parallel. Combine them into a single sentence that makes the parallel structure visible and emphatic.' },
      { label: 'Exercise 3', technique: 'Free choice — maximum complexity', sentences: ['Chiang argues that AI is a compression algorithm, not a reasoning system.', 'Roe and colleagues argue that AI-generated content is like digital plastic.', 'Both metaphors suggest that AI outputs require more critical evaluation, not less, as these tools become more capable.'], hint: 'Combine these three ideas into one or two sentences of your own design. Name every technique you used.' }
    ]
  }
};

var currentBand = null;
var currentIndex = 0;
var colorClasses = ['rose', 'orange', 'yellow'];

function selectBand(band) {
  currentBand = band;
  currentIndex = 0;
  document.querySelectorAll('.band-btn').forEach(function(b) {
    b.classList.toggle('active', parseInt(b.dataset.band) === band);
  });
  var data = BANDS[band];
  var intro = document.getElementById('bandIntro');
  intro.textContent = data.intro;
  intro.classList.add('visible');
  document.getElementById('progressArea').style.display = 'block';
  document.getElementById('completionScreen').classList.remove('visible');
  renderExercise(0);
}

function renderExercise(index) {
  var data = BANDS[currentBand];
  var ex = data.exercises[index];
  var container = document.getElementById('exerciseContainer');
  var color = colorClasses[index % 3];

  var html = '<div class="card" id="card-' + index + '">';
  html += '<div class="card-header"><span class="card-number">' + ex.label + '</span><span class="card-technique">' + ex.technique + '</span></div>';
  html += '<div class="card-body">';
  html += '<div class="sources">';
  ex.sentences.forEach(function(s, i) {
    html += '<div class="source-line"><span class="source-num">' + (i+1) + '.</span> ' + s + '</div>';
  });
  html += '</div>';
  html += '<div class="prompt-label">Your combination</div>';
  html += '<div class="hint">' + ex.hint + '</div>';
  html += '<textarea id="ta-' + index + '" placeholder="Type your combined sentence here\u2026"></textarea>';
  html += '</div>';
  html += '<div class="card-footer" id="footer-' + index + '">';
  html += '<button class="btn-submit" id="btn-submit-' + index + '">Get feedback</button>';
  html += '<button class="btn-skip" id="btn-skip-' + index + '">Skip</button>';
  html += '</div>';
  html += '</div>';

  container.innerHTML = html;
  updateProgress(index);

  document.getElementById('btn-submit-' + index).addEventListener('click', function() { submitCombination(index); });
  document.getElementById('btn-skip-' + index).addEventListener('click', function() { advanceOrComplete(index); });
  document.getElementById('ta-' + index).focus();
}

function updateProgress(index) {
  document.getElementById('progressFill').style.width = (index / 3 * 100) + '%';
  document.getElementById('progressLabel').textContent = index + ' of 3';
}

function submitCombination(index) {
  var ta = document.getElementById('ta-' + index);
  var userText = ta.value.trim();
  if (!userText) { ta.focus(); return; }

  var btn = document.getElementById('btn-submit-' + index);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Evaluating\u2026';

  var data = BANDS[currentBand];
  var ex = data.exercises[index];
  var sourcesText = ex.sentences.map(function(s, i) { return (i+1) + '. ' + s; }).join('\n');

  var gradeContext = currentBand <= 7
    ? 'Grades 6-7. Feedback should be encouraging and simple. Prioritize what worked over errors.'
    : currentBand <= 9
    ? 'Grades 8-9. Feedback should name the technique and note one thing that works well before noting issues.'
    : currentBand <= 11
    ? 'Grades 10-11. Feedback should name the technique precisely and evaluate rhetorical effect, not just correctness.'
    : 'Grade 12. Feedback should be analytically rigorous: name every technique used, evaluate rhetorical choices, compare against alternatives where relevant.';

  var systemPrompt = 'You are a grammar and writing instructor giving feedback on a sentence combining exercise. ' + gradeContext + '\n\nRespond ONLY with valid JSON, no preamble, no markdown:\n{\n  "techniqueName": "short name of technique used",\n  "heading": "one short evaluative phrase",\n  "body": "3-4 sentences of feedback"\n}';

  var userPrompt = 'Technique: ' + ex.technique + '\nSource sentences:\n' + sourcesText + '\nHint: ' + ex.hint + '\nStudent wrote: "' + userText + '"\nEvaluate.';

  fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('API ' + r.status);
    return r.json();
  })
  .then(function(d) {
    var raw = d.content.filter(function(b) { return b.type === 'text'; }).map(function(b) { return b.text; }).join('');
    var result = JSON.parse(raw.replace(/```json|```/g, '').trim());
    showFeedback(index, result);
  })
  .catch(function(e) { showApiError(index, e.message); });
}

function showFeedback(index, result) {
  var card = document.getElementById('card-' + index);
  var color = colorClasses[index % 3];
  var fb = document.createElement('div');
  fb.className = 'feedback feedback-' + color;
  fb.innerHTML = '<span class="badge badge-' + color + '">' + result.techniqueName + '</span><h4>' + result.heading + '</h4>';
  result.body.split('\n').filter(function(l) { return l.trim(); }).forEach(function(l) {
    var p = document.createElement('p');
    p.textContent = l;
    fb.appendChild(p);
  });
  card.appendChild(fb);

  var footer = document.getElementById('footer-' + index);
  footer.innerHTML = '';
  var btnR = document.createElement('button');
  btnR.className = 'btn-retry';
  btnR.textContent = 'Try again';
  btnR.addEventListener('click', function() { retryExercise(index); });
  footer.appendChild(btnR);
  var btnN = document.createElement('button');
  btnN.className = 'btn-next';
  btnN.textContent = index >= 2 ? 'Finish' : 'Next \u2192';
  btnN.addEventListener('click', function() { advanceOrComplete(index); });
  footer.appendChild(btnN);
  fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showApiError(index, msg) {
  var btn = document.getElementById('btn-submit-' + index);
  if (btn) { btn.disabled = false; btn.textContent = 'Get feedback'; }
  var card = document.getElementById('card-' + index);
  var err = document.createElement('div');
  err.className = 'api-error';
  err.textContent = 'Feedback unavailable. Please try again. (' + msg + ')';
  card.appendChild(err);
}

function retryExercise(index) {
  var card = document.getElementById('card-' + index);
  var fb = card.querySelector('.feedback');
  if (fb) fb.remove();
  var footer = document.getElementById('footer-' + index);
  footer.innerHTML = '';
  var btnS = document.createElement('button');
  btnS.className = 'btn-submit';
  btnS.textContent = 'Get feedback';
  btnS.id = 'btn-submit-' + index;
  btnS.addEventListener('click', function() { submitCombination(index); });
  footer.appendChild(btnS);
  var btnSk = document.createElement('button');
  btnSk.className = 'btn-skip';
  btnSk.textContent = 'Skip';
  btnSk.addEventListener('click', function() { advanceOrComplete(index); });
  footer.appendChild(btnSk);
  var ta = document.getElementById('ta-' + index);
  ta.value = '';
  ta.focus();
}

function advanceOrComplete(index) {
  currentIndex = index + 1;
  if (currentIndex >= 3) {
    document.getElementById('exerciseContainer').innerHTML = '';
    document.getElementById('completionNote').textContent = BANDS[currentBand].completion;
    document.getElementById('completionScreen').classList.add('visible');
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressLabel').textContent = '3 of 3';
  } else {
    renderExercise(currentIndex);
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('bandButtons').addEventListener('click', function(e) {
  var btn = e.target.closest('.band-btn');
  if (btn) selectBand(parseInt(btn.dataset.band));
});

document.getElementById('restartBtn').addEventListener('click', function() {
  currentIndex = 0;
  document.getElementById('completionScreen').classList.remove('visible');
  renderExercise(0);
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
</html>
